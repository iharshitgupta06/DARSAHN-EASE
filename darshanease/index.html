<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujjain Mahakal Darshan</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header id="main-header">
        <h1>Ujjain Mahakal Darshan</h1>
    </header>

    <main>
        <section id="hero-section" class="hero-section">
            <h2>Experience the Divine Grace.</h2>
            <img src="11.jpg" alt="Mahakal Temple" class="hero-image">
        </section>

        <section id="booking-section" class="booking-section">
            <div class="form-box" id="formBox">
                <h2>Book Your Darshan</h2>
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>

                    <div class="form-group">
                        <label for="tourists">Number of Tourists (1 - 10)</label>
                        <input type="number" id="tourists" name="tourists" min="1" max="10"
                            placeholder="Number of people (Max 10)" required>
                    </div>

                    <div class="form-group">
                        <label for="visitDate">Date of Visit</label>
                        <input type="date" id="visitDate" name="visitDate" required>
                    </div>

                    <div class="form-group">
                        <label for="timeSlot">Time Slot Selection</label>
                        <select id="timeSlot" name="timeSlot" required>
                            <option value="" disabled selected>Select a time slot</option>
                            <option value="04:00 AM - 06:00 AM (Bhasma Aarti)">04:00 AM - 06:00 AM (Bhasma Aarti)
                            </option>
                            <option value="09:00 AM - 12:00 PM">09:00 AM - 12:00 PM</option>
                            <option value="01:00 PM - 04:00 PM">01:00 PM - 04:00 PM</option>
                            <option value="06:00 PM - 09:00 PM">06:00 PM - 09:00 PM</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn" id="confirmBtn">Confirm Booking</button>
                </form>
            </div>
        </section>

        <section id="receipt-section" class="receipt-section" style="display: none;">
            <div class="receipt-card">
                <h2>Booking Successful</h2>
                <div class="receipt-details">
                    <p>Reference Number: <span id="refNum"></span></p>
                    <p>Name: <span id="receiptName"></span></p>
                    <p>Date: <span id="receiptDate"></span></p>
                    <p>Time Slot: <span id="receiptTime"></span></p>
                </div>
                <div class="receipt-actions no-print">
                    <button type="button" id="printBtn" class="action-btn">Print Receipt</button>
                    <button type="button" id="bookAnotherBtn" class="action-btn secondary-btn">Book Another</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
